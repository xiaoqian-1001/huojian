    <style>
        /* ========== iOS 26 风格变量 ========== */
        :root {
            --bg-color: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.88);
            --text-primary: #1d1c1f;
            --text-secondary: #6c6c70;
            --text-tertiary: #8e8e93;
            --border-color: rgba(224, 224, 230, 0.6);
            --accent-color: #007aff;
            --accent-hover: #005fc1;
            --glass-bg: rgba(255, 255, 255, 0.72);
            --result-bg: rgba(0, 122, 255, 0.08);
            --input-bg: rgba(255, 255, 255, 0.8);
            --tag-bg: #e9e9ef;
            --filter-active: #007aff;
            --filter-inactive: #e9e9ef;
            --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.04), 0 0 0 0.5px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 8px 28px rgba(0, 0, 0, 0.08), 0 0 0 0.5px rgba(0, 0, 0, 0.02);
            --blur-bg: saturate(180%) blur(20px);
        }

        body.dark {
            --bg-color: #000000;
            --card-bg: rgba(28, 28, 30, 0.88);
            --text-primary: #ffffff;
            --text-secondary: #98989e;
            --text-tertiary: #6c6c70;
            --border-color: rgba(56, 56, 62, 0.8);
            --accent-color: #0a84ff;
            --accent-hover: #409cff;
            --glass-bg: rgba(28, 28, 30, 0.78);
            --result-bg: rgba(10, 132, 255, 0.12);
            --input-bg: rgba(28, 28, 30, 0.8);
            --tag-bg: #2c2c2e;
            --filter-active: #0a84ff;
            --filter-inactive: #2c2c2e;
            --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.3), 0 0 0 0.5px rgba(255, 255, 255, 0.05);
            --shadow-md: 0 8px 28px rgba(0, 0, 0, 0.4), 0 0 0 0.5px rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'SF Pro Text', 'SF Pro Display', system-ui, 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
            padding-top: 0;
            overflow-x: hidden;
            text-align: center;
        }

        /* 彩虹闪光背景 - 保持原有效果但增加毛玻璃叠加 */
        #flash-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            opacity: 0.5;
            transition: background 0.3s ease;
        }

        /* 毛玻璃遮罩层 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--glass-bg);
            backdrop-filter: var(--blur-bg);
            -webkit-backdrop-filter: var(--blur-bg);
            z-index: -1;
            pointer-events: none;
        }

        /* 主容器 - iOS 26 风格卡片 */
        main {
            background: var(--card-bg);
            backdrop-filter: var(--blur-bg);
            -webkit-backdrop-filter: var(--blur-bg);
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: var(--shadow-md);
            max-width: 900px;
            margin: 40px auto 30px;
            width: 92%;
            position: relative;
            z-index: 1;
            border: 0.5px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 头像样式 - 毛玻璃边框 */
        main img {
            border-radius: 50%;
            box-shadow: var(--shadow-sm);
            border: 0.5px solid var(--border-color);
            margin-bottom: 16px;
        }

        /* 渐变标题 - iOS 26 风格 */
        h1 {
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #007aff, #5856d6, #ff2d55);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            width: 100%;
            margin-bottom: 8px;
            animation: gradientShift 5s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 列表容器 - 毛玻璃效果 */
        .list-container {
            width: 100%;
            margin-top: 20px;
        }

        ol {
            background: var(--result-bg);
            backdrop-filter: blur(10px);
            padding: 20px 20px 20px 45px;
            border-radius: 20px;
            border: 0.5px solid var(--border-color);
            text-align: left;
            margin: 0 auto;
            width: 100%;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        ol li {
            margin: 10px 0;
            color: var(--text-primary);
        }

        ol li strong {
            color: var(--accent-color);
            font-weight: 600;
        }

        /* 迷你按钮 - iOS 风格 */
        .mini-btn {
            padding: 6px 14px;
            font-size: 0.75rem;
            border-radius: 40px;
            background: var(--tag-bg);
            backdrop-filter: blur(10px);
            text-decoration: none;
            display: inline-block;
            vertical-align: middle;
            margin-left: 8px;
            border: 0.5px solid var(--border-color);
            transition: all 0.2s ease;
            color: var(--text-primary);
        }

        .mini-btn:hover {
            background: var(--accent-color);
            color: white;
            transform: scale(1.02);
        }

        .mini-btn span {
            background: linear-gradient(135deg, #007aff, #5856d6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 600;
        }

        .mini-btn:hover span {
            color: white;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
        }

        /* 大红按钮 - iOS 大按钮风格 */
        .big-red-btn {
            padding: 14px 24px;
            font-size: 1rem;
            margin: 24px auto 16px;
            border-radius: 44px;
            background: var(--accent-color);
            display: block;
            width: 100%;
            max-width: 400px;
            text-decoration: none;
            transition: all 0.2s ease;
            border: none;
            box-shadow: var(--shadow-sm);
        }

        .big-red-btn span {
            color: white !important;
            font-weight: 590;
            text-align: center;
            display: block;
        }

        .big-red-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            background: var(--accent-hover);
        }

        /* 浮动按钮 - 毛玻璃圆形 */
        .float-btn {
            position: fixed;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--glass-bg);
            backdrop-filter: var(--blur-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 0.5px solid var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
            z-index: 10001;
            font-size: 1.2rem;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .float-btn:hover {
            transform: scale(1.05);
            background: var(--tag-bg);
        }

        #theme-btn {
            top: 80px;
        }

        /* 账号网格 */
        .accounts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            width: 100%;
            margin-top: 20px;
        }

        /* 账号卡片 - iOS 26 毛玻璃风格 */
        .account-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 0.5px solid var(--border-color);
            border-radius: 20px;
            padding: 18px;
            text-align: left;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: var(--shadow-sm);
        }

        .account-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .account-email {
            font-weight: 630;
            font-size: 0.95rem;
            word-break: break-all;
            margin-bottom: 10px;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .account-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-tertiary);
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 0.5px solid var(--border-color);
        }

        /* 按钮组 */
        .account-btns {
            display: flex;
            gap: 10px;
        }

        .copy-btn {
            flex: 1;
            padding: 10px 12px;
            border: 0.5px solid var(--border-color);
            border-radius: 44px;
            font-size: 0.75rem;
            font-weight: 590;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            background: var(--tag-bg);
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
            transform: scale(0.98);
        }

        /* 加载动画 - iOS 风格 */
        .loading-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px;
            width: 100%;
            color: var(--text-secondary);
        }

        .spinner-border {
            width: 36px;
            height: 36px;
            border: 2.5px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 错误提示 */
        .error-message {
            color: #ff3b30;
            padding: 30px;
            text-align: center;
            width: 100%;
            background: var(--result-bg);
            border-radius: 20px;
            margin-top: 16px;
        }

        /* toast 提示 - iOS 风格 */
        .ios-toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            backdrop-filter: var(--blur-bg);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 44px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 9999;
            box-shadow: var(--shadow-md);
            border: 0.5px solid var(--border-color);
            animation: toastFade 0.3s ease;
        }

        @keyframes toastFade {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* 响应式调整 */
        @media (max-width: 576px) {
            main {
                padding: 24px 18px;
                margin: 20px auto;
            }
            h1 {
                font-size: 1.6rem;
            }
            .big-red-btn {
                font-size: 0.9rem;
                padding: 12px 20px;
            }
            .accounts-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }
            ol {
                padding: 16px 16px 16px 35px;
                font-size: 0.85rem;
            }
        }

        /* 统计徽章样式 */
        .stats-badge {
            margin-top: 16px;
            font-size: 0.7rem;
            color: var(--text-tertiary);
            background: var(--result-bg);
            padding: 6px 16px;
            border-radius: 40px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div id="flash-bg"></div>

    <div class="float-btn" id="theme-btn">🌙</div>

    <main>
        <img class="shadow mb-3 rounded-circle" height="90" width="90" src="https://is4-ssl.mzstatic.com/image/thumb/Purple126/v4/c5/50/ad/c550ad28-d7bb-209c-05a6-849296bfddc5/AppIcon-0-1x_U007emarketing-0-10-0-0-85-220.png/230x0w.webp">
        
        <h1>小钱共享小火箭</h1>
        <div class="stats-badge">🚀 实时更新 · 高速账号池</div>
        
        <div class="list-container">
            <ol>
                <li>打开 <strong>App Store</strong></li>
                <li>点击 <strong>头像</strong> → 底部 <strong>退出登录</strong></li>
                <li>复制 <strong>下方账号密码</strong> 登录</li>
                <li>点击 <strong>“其他选项-不升级”</strong></li>
                <li>搜索 <a class="mini-btn" href="https://apps.apple.com/us/app/shadowrocket/id932747118" target="_blank">Shadowrocket 下载</a></li>
                <li>用完务必 <strong>退出登录</strong> 防止锁机 <a class="mini-btn" href="https://s0.mall.tcl.com/group1/M00/00/89/CvoGBGd37jmAL0b-AE72lMZF4xc097.mp4" target="_blank">视频教程</a></li>
            </ol>
        </div>

        <a class="big-red-btn" href="https://codeberg.org/Jsnzkpg/Jsnzkpg/raw/Jsnzkpg/Jsnzkpg">
            <span>🚀 复制永久免费节点订阅</span>
        </a>

        <div id="accounts-container" style="width:100%;">
            <div class="loading-spinner" id="loading-spinner">
                <div class="spinner-border" role="status"></div>
                <span style="margin-top: 12px;">正在加载最新账号池...</span>
            </div>
            <div id="accounts-grid" class="accounts-grid"></div>
            <div id="error-message" class="error-message" style="display:none;"></div>
        </div>
    </main>

    <script>
        // 彩虹闪光背景
        const bg = document.getElementById('flash-bg');
        const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ff6600', '#ff0066'];
        setInterval(() => {
            bg.style.background = `linear-gradient(135deg, ${colors[Math.floor(Math.random()*colors.length)]}, ${colors[Math.floor(Math.random()*colors.length)]})`;
        }, 1200);

        // 主题切换
        const tBtn = document.getElementById('theme-btn');
        tBtn.onclick = () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('xiaoqian_theme', isDark ? 'dark' : 'light');
            tBtn.innerText = isDark ? '☀️' : '🌙';
        };
        
        if(localStorage.getItem('xiaoqian_theme') === 'dark') {
            document.body.classList.add('dark');
            tBtn.innerText = '☀️';
        } else {
            document.body.classList.remove('dark');
            tBtn.innerText = '🌙';
        }

        // 代理请求规避跨域
        const PROXY_URL = 'https://proxy.dsocks.uk/?url=';
        
        const SOURCES = {
            lineA: 'https://ccbaohe.com/appleID/',
            lineB: 'https://shadowrocket.best/api/accounts',
            lineC: 'https://www.lanhaiblog.com/post/3.html'
        };

        let allAccounts = [];

        window.addEventListener('load', fetchAllSources);

        function getRandomPastTime() {
            const now = new Date();
            const minutesAgo = Math.floor(Math.random() * 60) + 1;
            now.setMinutes(now.getMinutes() - minutesAgo);
            return now.toLocaleString('zh-CN', { hour12: false });
        }

        async function fetchAllSources() {
            document.getElementById('loading-spinner').style.display = 'flex';
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('error-message').innerText = '';
            
            allAccounts = [];
            
            try {
                await Promise.all([
                    fetchLineA().catch(err => { console.log('线路A失败:', err); return []; }),
                    fetchLineB().catch(err => { console.log('线路B失败:', err); return []; }),
                    fetchLineC().catch(err => { console.log('线路C失败:', err); return []; })
                ]);
                
                const uniqueAccounts = [];
                const emailSet = new Set();
                
                allAccounts.forEach(acc => {
                    if (acc.email && !emailSet.has(acc.email)) {
                        emailSet.add(acc.email);
                        uniqueAccounts.push(acc);
                    } else if (!acc.email && !emailSet.has(`unknown_${acc.password}`)) {
                        emailSet.add(`unknown_${acc.password}`);
                        uniqueAccounts.push(acc);
                    }
                });
                
                allAccounts = uniqueAccounts;
                
                allAccounts.sort((a, b) => {
                    const timeA = new Date(a.time).getTime();
                    const timeB = new Date(b.time).getTime();
                    if (isNaN(timeA) && isNaN(timeB)) return 0;
                    if (isNaN(timeA)) return 1;
                    if (isNaN(timeB)) return -1;
                    return timeB - timeA;
                });

                if (allAccounts.length === 0) throw new Error('暂未获取到账号，请刷新重试');
                
                renderAccounts(allAccounts);
                
            } catch (err) {
                console.error('获取账号失败:', err);
                document.getElementById('error-message').style.display = 'block';
                document.getElementById('error-message').innerHTML = '⛔ 加载失败，可能网络波动，请点击<a href="#" onclick="location.reload();return false;" style="color:var(--accent-color);">刷新页面</a>重试。';
            } finally {
                document.getElementById('loading-spinner').style.display = 'none';
            }
        }

        function cfDecode(e) {
            var r = parseInt(e.substr(0, 2), 16), n, i, a = "";
            for (n = 2; n < e.length; n += 2) {
                i = parseInt(e.substr(n, 2), 16) ^ r;
                a += String.fromCharCode(i);
            }
            return a;
        }

        async function fetchLineA() {
            try {
                const response = await fetch(PROXY_URL + encodeURIComponent(SOURCES.lineA));
                const html = await response.text();
                const accounts = [];
                const cardRegex = /col-lg-3.*?data-cfemail="([a-f0-9]+)".*?copy\('([^']+)'\)/gs;
                let match;
                while ((match = cardRegex.exec(html)) !== null) {
                    if (match[1] && match[2]) {
                        accounts.push({
                            email: cfDecode(match[1]),
                            password: match[2],
                            status: '可用',
                            time: getRandomPastTime(),
                            source: '主线路'
                        });
                    }
                }
                if (accounts.length === 0) {
                    const altRegex = /data-cfemail="([a-f0-9]+)".*?<button.*?copy\('([^']+)'\)/gs;
                    while ((match = altRegex.exec(html)) !== null) {
                        if (match[1] && match[2]) {
                            accounts.push({
                                email: cfDecode(match[1]),
                                password: match[2],
                                status: '可用',
                                time: getRandomPastTime(),
                                source: '主线路'
                            });
                        }
                    }
                }
                allAccounts = allAccounts.concat(accounts);
                return accounts;
            } catch (e) {
                console.warn("LineA 解析出错", e);
                return [];
            }
        }

        async function fetchLineB() {
            try {
                const response = await fetch(SOURCES.lineB);
                const data = await response.json();
                const accounts = [];
                if (data && Array.isArray(data.id)) {
                    data.id.forEach(item => {
                        if (item.email && item.password) {
                            accounts.push({
                                email: item.email,
                                password: item.password,
                                status: item.status || '正常',
                                time: item.time || getRandomPastTime(),
                                source: '备份线路'
                            });
                        }
                    });
                } else if (data && data.accounts && Array.isArray(data.accounts)) {
                    data.accounts.forEach(item => {
                        if (item.email && item.password) {
                            accounts.push({
                                email: item.email,
                                password: item.password,
                                status: '正常',
                                time: getRandomPastTime(),
                                source: '备份线路'
                            });
                        }
                    });
                }
                allAccounts = allAccounts.concat(accounts);
                return accounts;
            } catch (e) {
                console.warn("LineB 失败", e);
                return [];
            }
        }

        async function fetchLineC() {
            try {
                const response = await fetch(PROXY_URL + encodeURIComponent(SOURCES.lineC));
                const html = await response.text();
                const accounts = [];
                const cardRegex = /user-card.*?data-clipboard-text="([^"]+)".*?data-clipboard-text="([^"]+)"/gs;
                let match;
                while ((match = cardRegex.exec(html)) !== null) {
                    if (match[1] && match[2]) {
                        accounts.push({
                            email: match[1],
                            password: match[2],
                            status: '活跃',
                            time: getRandomPastTime(),
                            source: '备用线路'
                        });
                    }
                }
                const appleRegex = /apple-id.*?<strong>(.*?)<\/strong>.*?密码[：:]\s*(.*?)</gs;
                let match2;
                while ((match2 = appleRegex.exec(html)) !== null) {
                    if (match2[1] && match2[2]) {
                        accounts.push({
                            email: match2[1].trim(),
                            password: match2[2].trim(),
                            status: '正常',
                            time: getRandomPastTime(),
                            source: '备用线路'
                        });
                    }
                }
                allAccounts = allAccounts.concat(accounts);
                return accounts;
            } catch (e) {
                console.warn("LineC 失败", e);
                return [];
            }
        }

        function renderAccounts(accounts) {
            const grid = document.getElementById('accounts-grid');
            grid.innerHTML = '';

            if (!accounts.length) {
                grid.innerHTML = '<div class="error-message">暂无账号数据，请稍后重试～</div>';
                return;
            }

            accounts.forEach(acc => {
                let displayEmail = acc.email || '未知邮箱';
                if (displayEmail !== '未知邮箱' && displayEmail.includes('@')) {
                    let [local, domain] = displayEmail.split('@');
                    if (local && local.length > 4) {
                        local = local.substring(0, 3) + '***' + local.slice(-1);
                    }
                    displayEmail = local + '@' + domain;
                } else if (displayEmail !== '未知邮箱' && displayEmail.length > 12) {
                    displayEmail = displayEmail.substring(0, 8) + '***';
                }

                const card = document.createElement('div');
                card.className = 'account-card';
                card.innerHTML = `
                    <div class="account-email" title="${escapeHtml(acc.email || '')}">📧 ${escapeHtml(displayEmail)}</div>
                    <div class="account-meta">
                        <span><i class="bi bi-check-circle-fill"></i> ${escapeHtml(acc.status || '正常')}</span>
                        <span>🕒 ${acc.time || '刚刚'}</span>
                    </div>
                    <div class="account-btns">
                        <button class="copy-btn" data-copy-type="email" data-copy-content="${escapeAttr(acc.email)}"><i class="fa fa-copy"></i> 复制账号</button>
                        <button class="copy-btn" data-copy-type="pwd" data-copy-content="${escapeAttr(acc.password)}"><i class="fa fa-key"></i> 复制密码</button>
                    </div>
                `;
                grid.appendChild(card);
            });

            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const content = btn.getAttribute('data-copy-content');
                    if (content && content !== 'undefined' && content !== '') {
                        copyToClipboard(content);
                    } else {
                        showToast('❌ 内容为空，无法复制');
                    }
                });
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function escapeAttr(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function showToast(message) {
            const existingToast = document.querySelector('.ios-toast');
            if (existingToast) existingToast.remove();
            
            const toastDiv = document.createElement('div');
            toastDiv.className = 'ios-toast';
            toastDiv.innerText = message;
            document.body.appendChild(toastDiv);
            setTimeout(() => toastDiv.remove(), 1800);
        }

        function copyToClipboard(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast('✅ 已复制: ' + (text.length > 25 ? text.substring(0, 22) + '...' : text));
        }
